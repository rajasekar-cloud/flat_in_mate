spring:
  application:
    name: flatmate-app
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8081

# DynamoDB / AWS Configuration
aws:
  region: ${AWS_REGION:ap-south-1}
  dynamodb:
    table-name: ${DYNAMODB_TABLE_NAME:FlatmateData}
    initialize-table: ${DYNAMODB_INITIALIZE_TABLE:true}
  s3:
    bucket: ${S3_BUCKET:flatmate-photos}

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Razorpay Configuration
razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
  key-secret: ${RAZORPAY_KEY_SECRET:local-dev-placeholder}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-32-characters-long-for-hs256}
  access-token-expiry-hours: ${JWT_ACCESS_EXPIRY_HOURS:24}
  refresh-token-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:60}

logging:
  level:
    com.flatmate.app: DEBUG

# SurePass KYC
surepass:
  token: ${SUREPASS_TOKEN:}

# Firebase Admin SDK — set FIREBASE_SERVICE_ACCOUNT_PATH to enable real push notifications.
# Alternatively, place firebase-service-account.json in src/main/resources/ (DO NOT commit to git).
firebase:
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
  service-account-base64: ${FIREBASE_SERVICE_ACCOUNT_BASE64:}
