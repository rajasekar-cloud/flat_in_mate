# Copy this file to application-local.yml and fill in your values
# application-local.yml is gitignored — never commit real credentials

spring:
  application:
    name: flatmate-app
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8081

aws:
  region: ap-south-1
  dynamodb:
    table-name: FlatmateData
    initialize-table: true
  s3:
    bucket: flatmate-photos

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173

razorpay:
  key-id: YOUR_RAZORPAY_KEY_ID
  key-secret: YOUR_RAZORPAY_KEY_SECRET

jwt:
  secret: YourSuperSecretKeyAtLeast32CharactersLong
  access-token-expiry-hours: 24
  refresh-token-expiry-days: 60

logging:
  level:
    com.flatmate.app: DEBUG
