AWSTemplateFormatVersion: '2010-09-09'
Description: GitHub OIDC trust and deployment roles for rajasekar-cloud/flat_in_mate main branch.

Parameters:
  GitHubOwner:
    Type: String
    Default: rajasekar-cloud
  GitHubRepository:
    Type: String
    Default: flat_in_mate
  DeploymentBranch:
    Type: String
    Default: main
  ApplicationStackName:
    Type: String
    Default: flatmate-testing
  CreateOidcProvider:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']

Conditions:
  ShouldCreateOidcProvider: !Equals [!Ref CreateOidcProvider, 'true']

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateOidcProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      Tags:
        - Key: Purpose
          Value: GitHubActions

  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: flatmate-cloudformation-execution
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ManageFlatmateTestingInfrastructure
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: Ec2Infrastructure
                Effect: Allow
                Action:
                  - ec2:AssociateIamInstanceProfile
                  - ec2:AttachVolume
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:CreateSecurityGroup
                  - ec2:CreateTags
                  - ec2:CreateVolume
                  - ec2:DeleteSecurityGroup
                  - ec2:DeleteTags
                  - ec2:DeleteVolume
                  - ec2:Describe*
                  - ec2:DetachVolume
                  - ec2:DisassociateIamInstanceProfile
                  - ec2:ModifyInstanceAttribute
                  - ec2:ModifyVolume
                  - ec2:ReplaceIamInstanceProfileAssociation
                  - ec2:RevokeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:RunInstances
                  - ec2:StartInstances
                  - ec2:StopInstances
                  - ec2:TerminateInstances
                Resource: '*'
              - Sid: ManageFlatmateRoles
                Effect: Allow
                Action:
                  - iam:AddRoleToInstanceProfile
                  - iam:AttachRolePolicy
                  - iam:CreateInstanceProfile
                  - iam:CreateRole
                  - iam:DeleteInstanceProfile
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:DetachRolePolicy
                  - iam:GetInstanceProfile
                  - iam:ListAttachedRolePolicies
                  - iam:ListInstanceProfilesForRole
                  - iam:ListRolePolicies
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:PassRole
                  - iam:PutRolePolicy
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:TagRole
                  - iam:UntagRole
                Resource:
                  - !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:role/flatmate-*
                  - !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:instance-profile/flatmate-*
              - Sid: ManageFlatmateBuckets
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:DeleteBucketPolicy
                  - s3:DeleteBucketWebsite
                  - s3:GetBucketCORS
                  - s3:GetBucketLocation
                  - s3:GetBucketPolicy
                  - s3:GetBucketPublicAccessBlock
                  - s3:GetBucketTagging
                  - s3:GetBucketVersioning
                  - s3:GetEncryptionConfiguration
                  - s3:GetLifecycleConfiguration
                  - s3:ListBucket
                  - s3:PutBucketCORS
                  - s3:PutBucketPolicy
                  - s3:PutBucketPublicAccessBlock
                  - s3:PutBucketTagging
                  - s3:PutBucketVersioning
                  - s3:PutEncryptionConfiguration
                  - s3:PutLifecycleConfiguration
                Resource: arn:aws:s3:::flatmate-*
              - Sid: ManageApplicationQueues
                Effect: Allow
                Action:
                  - sqs:CreateQueue
                  - sqs:DeleteQueue
                  - sqs:GetQueueAttributes
                  - sqs:ListQueueTags
                  - sqs:SetQueueAttributes
                  - sqs:TagQueue
                  - sqs:UntagQueue
                Resource:
                  - !Sub arn:${AWS::Partition}:sqs:${AWS::Region}:${AWS::AccountId}:swipe-events
                  - !Sub arn:${AWS::Partition}:sqs:${AWS::Region}:${AWS::AccountId}:match-events
              - Sid: ManageApplicationLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:DescribeLogGroups
                  - logs:ListTagsForResource
                  - logs:PutRetentionPolicy
                  - logs:TagResource
                  - logs:UntagResource
                Resource: '*'
              - Sid: ManageCloudFrontDistribution
                Effect: Allow
                Action:
                  - cloudfront:CreateDistribution
                  - cloudfront:DeleteDistribution
                  - cloudfront:GetDistribution
                  - cloudfront:GetDistributionConfig
                  - cloudfront:ListTagsForResource
                  - cloudfront:TagResource
                  - cloudfront:UntagResource
                  - cloudfront:UpdateDistribution
                Resource: '*'
              - Sid: ResolveAmazonLinuxAmi
                Effect: Allow
                Action: ssm:GetParameters
                Resource: !Sub arn:${AWS::Partition}:ssm:${AWS::Region}::parameter/aws/service/ami-amazon-linux-latest/*

  GitHubDeploymentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: flatmate-github-deploy
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - ShouldCreateOidcProvider
                - !Ref GitHubOidcProvider
                - !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOwner}/${GitHubRepository}:ref:refs/heads/${DeploymentBranch}
      Policies:
        - PolicyName: DeployFlatmateTesting
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ValidateTemplates
                Effect: Allow
                Action: cloudformation:ValidateTemplate
                Resource: '*'
              - Sid: ManageApplicationStack
                Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:CreateStack
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStacks
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ListStackResources
                  - cloudformation:UpdateStack
                Resource: !Sub arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${ApplicationStackName}/*
              - Sid: PassCloudFormationExecutionRole
                Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt CloudFormationExecutionRole.Arn
                Condition:
                  StringEquals:
                    iam:PassedToService: cloudformation.amazonaws.com
              - Sid: UploadDeploymentArtifacts
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:PutObject
                Resource:
                  - arn:aws:s3:::flatmate-*
                  - arn:aws:s3:::flatmate-*/*
              - Sid: DescribeDeploymentInstance
                Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeManagedPrefixLists
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                Resource: '*'
              - Sid: VerifyExistingDynamoDbTable
                Effect: Allow
                Action: dynamodb:DescribeTable
                Resource: !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/*
              - Sid: DiscoverSsmConnectivity
                Effect: Allow
                Action: ssm:DescribeInstanceInformation
                Resource: '*'
              - Sid: UseSsmDocument
                Effect: Allow
                Action: ssm:SendCommand
                Resource: !Sub arn:${AWS::Partition}:ssm:${AWS::Region}::document/AWS-RunShellScript
              - Sid: DeployToTaggedInstance
                Effect: Allow
                Action: ssm:SendCommand
                Resource: !Sub arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:instance/*
                Condition:
                  StringEquals:
                    ssm:resourceTag/Environment: testing
              - Sid: ReadDeploymentCommandStatus
                Effect: Allow
                Action:
                  - ssm:GetCommandInvocation
                  - ssm:ListCommandInvocations
                Resource: '*'
      Tags:
        - Key: Purpose
          Value: GitHubActionsFlatmateDeployment

Outputs:
  GitHubRoleArn:
    Value: !GetAtt GitHubDeploymentRole.Arn
  CloudFormationExecutionRoleArn:
    Value: !GetAtt CloudFormationExecutionRole.Arn
  RestrictedGitHubSubject:
    Value: !Sub repo:${GitHubOwner}/${GitHubRepository}:ref:refs/heads/${DeploymentBranch}
