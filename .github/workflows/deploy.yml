name: CD - Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Pre-flight Check (Verify Secrets)
      run: |
        echo "Checking required secrets..."
        vars=("EC2_HOST" "SSH_PRIVATE_KEY" "AWS_ACCESS_KEY_ID" "AWS_SECRET_ACCESS_KEY" "AWS_REGION" "JWT_SECRET" "DYNAMODB_TABLE_NAME" "GOOGLE_CLIENT_ID" "GOOGLE_CLIENT_SECRET" "RAZORPAY_KEY_ID" "RAZORPAY_KEY_SECRET")
        for var in "${vars[@]}"; do
          if [ -z "${!var}" ]; then
            echo "::error::Secret $var is MISSING! Please add it to Settings -> Secrets and variables -> Actions."
            exit 1
          fi
        done
        echo "All critical secrets are present."
      env:
        EC2_HOST: ${{ secrets.EC2_HOST }}
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ${{ secrets.AWS_REGION }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        DYNAMODB_TABLE_NAME: ${{ secrets.DYNAMODB_TABLE_NAME }}
        GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
        RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}

    - name: Prepare Server (Clean old code)
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        debug: true
        script: |
          sudo chown -R ec2-user:ec2-user /home/ec2-user/flatmate || true
          sudo rm -rf /home/ec2-user/flatmate/src
          sudo rm -rf /home/ec2-user/flatmate/pom.xml
          sudo rm -rf /home/ec2-user/flatmate/Dockerfile
          sudo rm -rf /home/ec2-user/flatmate/docker-compose.yml

    - name: Deploy Code via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        debug: true
        source: "Dockerfile,docker-compose.yml,nginx/,pom.xml,src/"
        target: "/home/ec2-user/flatmate/"
        strip_components: 0

    - name: Rebuild and Start Containers via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        debug: true
        script: |
          set -e
          cd /home/ec2-user/flatmate
          
          echo ">>> 1. Stopping existing containers to free Port 80..."
          sudo docker compose down --remove-orphans || true

          echo ">>> 2. Ensuring Certbot is installed..."
          sudo dnf install -y certbot || true

          echo ">>> 3. Requesting/Renewing SSL Certificate..."
          # Running with -v to see detailed output if it fails
          sudo certbot certonly --standalone -d flatmate-api.duckdns.org --non-interactive --agree-tos -m admin@flatmate-api.duckdns.org --keep-until-expiring -v

          echo ">>> 4. Creating/Updating .env file..."
          cat <<EOF > .env
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          DYNAMODB_TABLE_NAME=${{ secrets.DYNAMODB_TABLE_NAME }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
          EOF

          echo ">>> 5. Building and starting new containers..."
          sudo docker compose build
          sudo docker compose up -d

          echo ">>> 6. Cleanup old images..."
          sudo docker system prune -f
          
          echo ">>> DEPLOYMENT SUCCESSFUL! Validating Nginx..."
          sudo docker ps | grep nginx
