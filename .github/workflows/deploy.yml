name: CD - Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Prepare Server (Clean old code)
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          sudo chown -R ec2-user:ec2-user /home/ec2-user/flatmate || true
          sudo rm -rf /home/ec2-user/flatmate/src
          sudo rm -rf /home/ec2-user/flatmate/pom.xml
          sudo rm -rf /home/ec2-user/flatmate/Dockerfile
          sudo rm -rf /home/ec2-user/flatmate/docker-compose.yml

    - name: Deploy Code via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "Dockerfile,docker-compose.yml,nginx/,pom.xml,src/"
        target: "/home/ec2-user/flatmate/"
        strip_components: 0

    - name: Rebuild and Start Containers via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /home/ec2-user/flatmate
          
          # 1. Stop docker immediately so port 80 is free for Certbot standalone validation
          sudo docker compose down || true

          # 2. Install certbot
          sudo dnf install -y certbot || true

          # 3. Request or renew free Let's Encrypt certificate
          sudo certbot certonly --standalone -d flatmate-api.duckdns.org --non-interactive --agree-tos -m admin@flatmate-api.duckdns.org --keep-until-expiring

          # 4. Inject environment variables from GitHub Secrets
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" > .env
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
          echo "AWS_REGION=${{ secrets.AWS_REGION }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "DYNAMODB_TABLE_NAME=${{ secrets.DYNAMODB_TABLE_NAME }}" >> .env
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
          echo "RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}" >> .env
          echo "RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}" >> .env

          # Restart containers
          docker compose build
          docker compose up -d
          docker system prune -f
