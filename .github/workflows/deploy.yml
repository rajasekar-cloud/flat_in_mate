name: CD - Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Pre-flight Check (Verify Secrets)
      run: |
        echo ">>> Starting Secret Verification..."
        REQUIRED_VARS=("AWS_SSH_KEY_NAME" "SSH_PRIVATE_KEY" "AWS_ACCESS_KEY_ID" "AWS_SECRET_ACCESS_KEY" "AWS_REGION" "JWT_SECRET" "DYNAMODB_TABLE_NAME" "GOOGLE_CLIENT_ID" "GOOGLE_CLIENT_SECRET" "RAZORPAY_KEY_ID" "RAZORPAY_KEY_SECRET")
        for var_name in "${REQUIRED_VARS[@]}"; do
          echo "Checking $var_name..."
          if [ -z "${!var_name}" ]; then
            echo "::error::[FAILURE] Secret '$var_name' is empty or missing! Please add it to GitHub Settings."
            exit 1
          fi
        done
        echo "✅ All required secrets are verified and present."
      env:
        AWS_SSH_KEY_NAME: ${{ secrets.AWS_SSH_KEY_NAME }}
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ${{ secrets.AWS_REGION }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        DYNAMODB_TABLE_NAME: ${{ secrets.DYNAMODB_TABLE_NAME }}
        GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
        RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Deploy AWS Infrastructure
      id: deploy-infra
      run: |
        echo ">>> Deploying AWS Infrastructure via CloudFormation..."
        aws cloudformation deploy \
          --template-file aws-infrastructure.yml \
          --stack-name flatmate-app-server \
          --parameter-overrides KeyName=${{ secrets.AWS_SSH_KEY_NAME }} \
          --capabilities CAPABILITY_NAMED_IAM
        
        echo ">>> Fetching Public IP of the created/updated Server..."
        PUBLIC_IP=$(aws cloudformation describe-stacks \
          --stack-name flatmate-app-server \
          --query 'Stacks[0].Outputs[?OutputKey==`PublicIp`].OutputValue' \
          --output text)
        
        echo "EC2_HOST=$PUBLIC_IP" >> $GITHUB_ENV
        echo "🚀 Server is running at: $PUBLIC_IP"
        
        API_GATEWAY_URL=$(aws cloudformation describe-stacks \
          --stack-name flatmate-app-server \
          --query 'Stacks[0].Outputs[?OutputKey==`ApiGatewayUrl`].OutputValue' \
          --output text)
          
        echo "🌐 API Gateway Endpoint: $API_GATEWAY_URL"

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven (on GitHub Runner)
      run: mvn clean package -DskipTests

    - name: Prepare Server (Clean old code)
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ env.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        debug: true
        script: |
          sudo chown -R ec2-user:ec2-user /home/ec2-user/flatmate || true
          sudo rm -rf /home/ec2-user/flatmate/target
          sudo rm -rf /home/ec2-user/flatmate/Dockerfile
          sudo rm -rf /home/ec2-user/flatmate/docker-compose.yml

    - name: Deploy Code via SCP
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ env.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        debug: true
        source: "Dockerfile,docker-compose.yml,nginx/,target/*.jar"
        target: "/home/ec2-user/flatmate/"
        strip_components: 0

    - name: Rebuild and Start Containers via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ env.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        debug: true
        script: |
          set -e
          cd /home/ec2-user/flatmate
          
          echo ">>> 0. Checking Docker installation..."
          if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              sudo dnf update -y
              sudo dnf install -y docker
              sudo mkdir -p /usr/libexec/docker/cli-plugins
              sudo curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-$(uname -m) -o /usr/libexec/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/libexec/docker/cli-plugins/docker-compose
              sudo systemctl enable docker
              sudo systemctl start docker
          fi
          
          echo ">>> 1. Stopping existing containers..."
          sudo docker compose down --remove-orphans || true

          echo ">>> 2. Creating/Updating .env file..."
          cat <<EOF > .env
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          DYNAMODB_TABLE_NAME=${{ secrets.DYNAMODB_TABLE_NAME }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
          EOF

          echo ">>> 3. Building and starting new containers..."
          sudo docker build -t flatmate-app:latest .
          sudo docker compose up -d

          echo ">>> 4. Cleanup old images..."
          sudo docker system prune -f
          
          echo ">>> DEPLOYMENT SUCCESSFUL! Validating Nginx..."
          sudo docker ps | grep nginx
