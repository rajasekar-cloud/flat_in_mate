name: Validate Backend

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '17'
          cache: maven

      - name: Run tests and package
        run: mvn --batch-mode verify

      - name: Check remote shell scripts
        run: bash -n scripts/remote-deploy.sh scripts/remote-rollback.sh

      - name: Install CloudFormation linter
        run: pip install cfn-lint

      - name: Lint CloudFormation templates
        run: cfn-lint template.yaml github-oidc-deploy-role.yaml
